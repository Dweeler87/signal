server {
    server_name forelight.net www.forelight.net;

    # Landing pages — served directly from disk
    location = / {
        root /opt/signal/landing;
        try_files /index.html =404;
    }
    location = /clay {
        root /opt/signal/landing;
        try_files /clay.html =404;
    }
    location = /methodology {
        root /opt/signal/landing;
        try_files /methodology.html =404;
    }
    location = /upgrade {
        root /opt/signal/landing;
        try_files /upgrade.html =404;
    }
    location = /sitemap.xml {
        root /opt/signal/landing;
        try_files /sitemap.xml =404;
    }
    location = /robots.txt {
        root /opt/signal/landing;
        try_files /robots.txt =404;
    }

    # API + docs — proxied to uvicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/forelight.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/forelight.net/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.forelight.net) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = forelight.net) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name forelight.net www.forelight.net;
    return 404; # managed by Certbot
}
